<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditorium Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1011;
            --panel-bg: #1a1a1c;
            --cyan: #00e5ff;
            --yellow: #ffb300;
            --grey: #333;
            --light-grey: #888;
            --text-white: #ffffff;
            --text-grey: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        #simulation-container {
            position: absolute;
            top: 0;
            left: 0;
            width: calc(100vw - 320px);
            height: calc(100vh - 320px);
            background: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* RIGHT SIDEBAR */
        #status-sidebar {
            position: absolute;
            top: 0;
            right: 0;
            width: 320px;
            height: 100vh;
            background-color: var(--panel-bg);
            border-left: 1px solid #2a2a2c;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            color: var(--yellow);
            font-size: 14px;
            text-align: center;
            border-bottom: 2px solid #2a2a2c;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #fixture-groups {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .fixture-group {
            margin-bottom: 20px;
        }

        .fixture-group-title {
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fixture-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #252528;
            padding: 8px 10px;
            border-radius: 4px;
            margin-bottom: 5px;
            font-size: 11px;
        }

        .fixture-name {
            color: var(--text-grey);
            flex: 1;
        }

        .fixture-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fixture-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .fixture-value {
            color: var(--text-white);
            font-family: monospace;
            width: 30px;
            text-align: right;
        }

        /* BOTTOM PANEL */
        #bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: calc(100vw - 320px);
            height: 320px;
            background-color: var(--panel-bg);
            border-top: 1px solid #2a2a2c;
            display: flex;
            flex-direction: column;
            z-index: 10;
            padding: 15px;
        }

        /* PROGRESS BAR */
        #progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        #progress-bar {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        #progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--cyan);
            width: 0%;
            border-radius: 2px;
        }

        #progress-handle {
            position: absolute;
            top: 50%;
            left: 0%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: var(--yellow);
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 179, 0, 0.5);
        }

        #time-display {
            font-family: monospace;
            font-size: 12px;
            color: var(--text-grey);
        }

        /* DASHBOARD LAYOUT */
        #dashboard {
            display: flex;
            flex: 1;
            gap: 15px;
            min-height: 0;
        }

        /* SCRIPT PANEL (LEFT) */
        #script-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }

        .panel-label {
            color: var(--yellow);
            font-size: 11px;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        #teleprompter {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            line-height: 1.5;
            height: 80px;
            overflow-y: auto;
            border: 1px solid #2a2a2c;
        }

        .speaker-name {
            color: var(--yellow);
            font-weight: bold;
            margin-right: 5px;
        }

        .dialogue-text {
            color: var(--text-white);
        }

        .system-action {
            color: var(--cyan);
            font-style: italic;
        }

        .word-spoken {
            color: var(--cyan);
            text-shadow: 0 0 5px var(--cyan);
        }

        #cue-list {
            flex: 1;
            background: #000;
            border: 1px solid #2a2a2c;
            border-radius: 5px;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* CUE ITEM STYLES */
        .cue-item {
            padding: 10px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            border-left: 4px solid transparent;
            font-size: 12px;
        }

        .cue-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cue-title {
            color: var(--text-grey);
            font-weight: bold;
        }

        .cue-header-text {
            color: var(--text-grey);
            font-style: italic;
        }

        .theme-select {
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 11px;
        }

        .cue-item.active {
            background: rgba(0, 229, 255, 0.1);
            border-left-color: var(--cyan);
        }

        .cue-item.active .cue-title {
            color: var(--cyan);
        }

        .cue-item.active .cue-header-text {
            color: var(--text-white);
        }

        .cue-content {
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .cue-content .speaker {
            color: #ff9800;
            font-weight: bold;
            margin-right: 8px;
        }

        .cue-content .scene-id {
            color: #e040fb; /* Purple */
            font-weight: bold;
        }

        /* CONTROLS (RIGHT) */
        #controls-panel {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .top-controls {
            display: flex;
            gap: 15px;
            height: 100px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        #btn-prev {
            flex: 1;
            background: #333;
            color: #aaa;
        }
        #btn-prev:hover { background: #444; color: #fff; }

        #btn-hold {
            flex: 1;
            background: var(--yellow);
            color: #000;
        }
        #btn-hold:hover { box-shadow: 0 0 15px rgba(255, 179, 0, 0.4); }

        #btn-go {
            flex: 1;
            background: var(--cyan);
            color: #000;
            font-size: 24px;
        }
        #btn-go:hover { box-shadow: 0 0 20px rgba(0, 229, 255, 0.4); }

    </style>
</head>
<body>
    <div id="simulation-container">
        <!-- Canvas injected by JS -->
    </div>

    <!-- RIGHT SIDEBAR -->
    <div id="status-sidebar">
        <div class="sidebar-header">
            💡 REAL-TIME STATUS
        </div>
        <div id="fixture-groups">
            <!-- Dynamically Populated by JS -->
        </div>
    </div>

    <!-- BOTTOM PANEL -->
    <div id="bottom-panel">
        <div id="progress-container">
            <div id="progress-bar">
                <div id="progress-fill"></div>
                <div id="progress-handle"></div>
            </div>
            <div id="time-display">00:00 / 00:00</div>
        </div>

        <div id="dashboard">
            <div id="script-panel">
                <div class="panel-label">📜 LIVE SCRIPT</div>
                <div id="teleprompter">
                    <!-- Text flows here -->
                </div>
                <div id="cue-list">
                    <!-- Cues here -->
                </div>
            </div>

            <div id="controls-panel">
                <div class="top-controls">
                    <button id="btn-prev" class="btn">|◀ PREV</button>
                    <button id="btn-hold" class="btn">⏸ HOLD</button>
                </div>
                <button id="btn-go" class="btn">GO ⏭</button>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
